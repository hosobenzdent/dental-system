<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>لوحة التحكم</title>

<style>
body {
  font-family: Arial;
  background: #f5f5f5;
  padding: 20px;
}

.container {
  max-width: 1000px;
  margin: auto;
  background: white;
  padding: 20px;
  border-radius: 10px;
}

input, select, button {
  padding: 10px;
  margin: 5px;
}

button {
  background: black;
  color: white;
  border: none;
  cursor: pointer;
}

button:hover {
  opacity: 0.8;
}

table {
  width: 100%;
  margin-top: 20px;
  border-collapse: collapse;
}

th, td {
  border: 1px solid #ddd;
  padding: 10px;
  text-align: center;
}

tr:hover {
  background: #f1f1f1;
}
</style>
</head>

<body>

<div class="container">

<h2>🦷 إدارة النقابة</h2>

<input id="name" placeholder="الاسم">
<input id="reg" placeholder="رقم القيد">
<input id="university" placeholder="الجامعة">
<input id="grad_date" placeholder="تاريخ التخرج">
<input id="national_id" placeholder="الرقم الوطني">
<input id="birth_year" placeholder="سنة الميلاد">

<select id="gender">
  <option value="male">ذكر</option>
  <option value="female">أنثى</option>
</select>

<button id="saveBtn" onclick="addMember()">إضافة</button>

<hr>

<input id="search" placeholder="بحث..." onkeyup="loadMembers()">

<table>
<thead>
<tr>
  <th>الاسم</th>
  <th>القيد</th>
  <th>الجنس</th>
  <th>الجامعة</th>
  <th>سنة الميلاد</th>
  <th>إذن</th>
  <th>عرض</th>
  <th>تعديل</th>
  <th>حذف</th>
</tr>
</thead>

<tbody id="table"></tbody>
</table>

</div>

<script>

let editingId = null;

async function addMember() {

  const data = {
    full_name: name.value,
    registration_number: reg.value,
    gender: gender.value,
    university: university.value,
    graduation_date: grad_date.value,
    national_id: national_id.value,
    birth_year: birth_year.value
  };

  if (editingId) {
    await fetch("/members/" + editingId, {
      method: "PUT",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(data)
    });

    editingId = null;
    saveBtn.innerText = "إضافة";
  } else {
    await fetch("/members", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(data)
    });
  }

  document.querySelectorAll("input").forEach(i => i.value = "");

  loadMembers();
}

async function loadMembers() {

  const search = document.getElementById("search").value.toLowerCase();

  const res = await fetch("/members");
  const data = await res.json();

  table.innerHTML = "";

  data
    .filter(m => m.full_name.toLowerCase().includes(search))
    .forEach(m => {

      table.innerHTML += `
<tr>
  <td>${m.full_name}</td>
  <td>${m.registration_number}</td>
  <td>${m.gender === 'male' ? 'ذكر' : 'أنثى'}</td>
  <td>${m.university || ''}</td>
  <td>${m.birth_year || ''}</td>

  <td><button onclick="issue(${m.id})">إصدار</button></td>
  <td><button onclick="view(${m.id})">عرض</button></td>
  <td><button onclick="edit(${m.id})">✏️</button></td>
  <td><button onclick="del(${m.id})">❌</button></td>
</tr>
      `;
    });
}

async function issue(id) {
  await fetch("/permit/" + id, { method: "POST" });
  alert("تم إصدار الإذن");
}

function view(id) {
  window.open("/permit/" + id);
}

async function del(id) {
  if (!confirm("تأكيد الحذف؟")) return;
  await fetch("/members/" + id, { method: "DELETE" });
  loadMembers();
}

async function edit(id) {

  const res = await fetch("/members");
  const data = await res.json();
  const m = data.find(x => x.id === id);

  name.value = m.full_name;
  reg.value = m.registration_number;
  gender.value = m.gender;
  university.value = m.university || "";
  grad_date.value = m.graduation_date || "";
  national_id.value = m.national_id || "";
  birth_year.value = m.birth_year || "";

  editingId = id;
  saveBtn.innerText = "تحديث";
}

window.onload = loadMembers;

</script>

</body>
</html>

</body>
</html>
