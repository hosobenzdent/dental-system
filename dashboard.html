<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>لوحة التحكم</title>

<style>
body {
  font-family: Arial;
  background: #f5f5f5;
  padding: 20px;
}

h1 {
  text-align: center;
}

.container {
  max-width: 900px;
  margin: auto;
  background: white;
  padding: 20px;
  border-radius: 10px;
}

input, select, button {
  padding: 10px;
  margin: 5px;
}

button {
  background: black;
  color: white;
  border: none;
  cursor: pointer;
}

table {
  width: 100%;
  margin-top: 20px;
  border-collapse: collapse;
}

th, td {
  border: 1px solid #ddd;
  padding: 10px;
  text-align: center;
}

</style>
</head>

<body>

<h1>🦷 لوحة إدارة النقابة</h1>

<div class="container">

  <h3>➕ إضافة طبيب</h3>

  <input id="name" placeholder="الاسم الكامل">
  <input id="reg" placeholder="رقم القيد">
  <input id="university" placeholder="الجامعة">
<input id="grad_date" placeholder="تاريخ التخرج">
<input id="national_id" placeholder="الرقم الوطني">
<input id="birth_year" placeholder="سنة الميلاد">
  <select id="gender">
    <option value="male">ذكر</option>
    <option value="female">أنثى</option>
  </select>

  <button onclick="addMember()">إضافة</button>

  <hr>

  <h3>🔍 بحث</h3>
  <input id="search" placeholder="ابحث بالاسم..." onkeyup="loadMembers()">

  <table>
    <thead>
  <tr>
    <th>الاسم</th>
    <th>رقم القيد</th>
    <th>الجنس</th>
    <th>الجامعة</th>       
    <th>سنة الميلاد</th>   
  <th>الرقم الوطني</th>
    <th>إذن</th>
    <th>عرض</th>
  </tr>
</thead>
    <tbody id="table"></tbody>
  </table>

</div>

<script>

const API = "";

async function addMember() {
  const full_name = document.getElementById("name").value;
  const registration_number = document.getElementById("reg").value;
  const gender = document.getElementById("gender").value;

  const university = document.getElementById("university").value;
  const graduation_date = document.getElementById("grad_date").value;
  const national_id = document.getElementById("national_id").value;
  const birth_year = document.getElementById("birth_year").value;

  await fetch("/members", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      full_name,
      registration_number,
      gender,
      university,
      graduation_date,
      national_id,
      birth_year
    })
  });

  loadMembers();
}

async function loadMembers() {
  const search = document.getElementById("search").value.toLowerCase();

  const res = await fetch(API + "/members");
  const data = await res.json();

  const table = document.getElementById("table");
  table.innerHTML = "";

  data
    .filter(m => m.full_name.toLowerCase().includes(search))
    .forEach(m => {

      const row = `
        <tr>
          <td>${m.full_name}</td>
          <td>${m.registration_number}</td>
          <td>${m.gender}</td>
<td>${m.university || ''}</td>
<td>${m.birth_year || ''}</td>
          <td>
            <button onclick="issuePermit(${m.id})">إصدار</button>
          </td>

          <td>
            <button onclick="viewPermit(${m.id})">فتح</button>
          </td>
        </tr>
      `;

      table.innerHTML += row;
    });
}

async function issuePermit(id) {
  await fetch(API + "/permit/" + id, { method: "POST" });
  alert("✅ تم إصدار الإذن");
}

function viewPermit(id) {
  window.open(API + "/permit/" + id, "_blank");
}

loadMembers();

</script>

</body>
</html>
